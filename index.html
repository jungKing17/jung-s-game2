<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ninja Runner Game</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 JSX/TSX를 실행하기 위함) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #171717; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 게임 코드 시작 -->
  <script type="text/babel" data-presets="react,typescript">
    const { useEffect, useRef, useState, useCallback } = React;

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 400;
    const GROUND_Y = 320;

    function App() {
      const canvasRef = useRef(null);
      const [gameState, setGameState] = useState('START');
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(0);

      const gameStateRef = useRef({
        ninja: { x: 80, y: GROUND_Y - 40, width: 30, height: 40, vy: 0, isJumping: false, jumpCount: 0, isSliding: false, isBlocking: false, blockEndTime: 0 },
        enemyNinjas: [],
        purpleDeathScore: null,
        greenDeathScore: null,
        redSpawned: false,
        obstacles: [],
        clouds: [],
        playerShurikens: [],
        lastShurikenTime: 0,
        lastBlockTime: 0,
        score: 0,
        frames: 0,
        speed: 6,
        isGameOver: false,
      });

      const initGame = useCallback(() => {
        gameStateRef.current = {
          ninja: { x: 80, y: GROUND_Y - 40, width: 30, height: 40, vy: 0, isJumping: false, jumpCount: 0, isSliding: false, isBlocking: false, blockEndTime: 0 },
          enemyNinjas: [],
          purpleDeathScore: null,
          greenDeathScore: null,
          redSpawned: false,
          obstacles: [],
          playerShurikens: [],
          lastShurikenTime: 0,
          lastBlockTime: 0,
          clouds: Array.from({ length: 6 }).map(() => ({
            x: Math.random() * CANVAS_WIDTH,
            y: 20 + Math.random() * (GROUND_Y - 150),
            width: 40 + Math.random() * 60,
            speed: 0.2 + Math.random() * 0.5,
          })),
          score: 0,
          frames: 0,
          speed: 6,
          isGameOver: false,
        };
        setScore(0);
      }, []);

      const startGame = useCallback(() => {
        initGame();
        setGameState('PLAYING');
      }, [initGame]);

      const jump = useCallback(() => {
        const state = gameStateRef.current;
        if (state.isGameOver) return;
        
        if (state.ninja.jumpCount < 2) {
          state.ninja.vy = -12;
          state.ninja.isJumping = true;
          state.ninja.jumpCount++;
          state.ninja.isSliding = false;
          state.ninja.height = 40;
        }
      }, []);

      const slide = useCallback((isSliding) => {
        const state = gameStateRef.current;
        if (state.isGameOver || state.ninja.isJumping) return;
        
        state.ninja.isSliding = isSliding;
        if (isSliding) {
          state.ninja.height = 20;
          state.ninja.y = GROUND_Y - 20;
        } else {
          state.ninja.height = 40;
          state.ninja.y = GROUND_Y - 40;
        }
      }, []);

      const throwShuriken = useCallback(() => {
        const state = gameStateRef.current;
        if (state.isGameOver) return;
        
        const now = Date.now();
        if (now - state.lastShurikenTime >= 250) {
          state.lastShurikenTime = now;
          state.playerShurikens.push({
            x: state.ninja.x + state.ninja.width,
            y: state.ninja.y + state.ninja.height / 2 - 10,
            width: 20,
            height: 20,
            vx: 12,
          });
        }
      }, []);

      const block = useCallback(() => {
        const state = gameStateRef.current;
        if (state.isGameOver) return;
        
        const now = Date.now();
        if (now - state.lastBlockTime >= 1000) {
          state.lastBlockTime = now;
          state.ninja.isBlocking = true;
          state.ninja.blockEndTime = now + 400;
        }
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.code === 'Space' || e.code === 'ArrowUp') {
            e.preventDefault();
            if (gameState === 'PLAYING') jump();
            else startGame();
          } else if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (gameState === 'PLAYING') slide(true);
          } else if (e.code === 'KeyQ' || e.key === 'q' || e.key === 'Q') {
            e.preventDefault();
            if (gameState === 'PLAYING') throwShuriken();
          } else if (e.code === 'KeyW' || e.key === 'w' || e.key === 'W') {
            e.preventDefault();
            if (gameState === 'PLAYING') block();
          }
        };

        const handleKeyUp = (e) => {
          if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (gameState === 'PLAYING') slide(false);
          }
        };

        const handleTouchStart = (e) => {
          if (e.target instanceof HTMLButtonElement) return;
          e.preventDefault();
          if (gameState === 'PLAYING') {
            const touchX = e.touches[0].clientX;
            if (touchX > window.innerWidth / 2) jump();
            else slide(true);
          } else {
            startGame();
          }
        };

        const handleTouchEnd = (e) => {
          if (gameState === 'PLAYING') slide(false);
        };

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        window.addEventListener('touchstart', handleTouchStart, { passive: false });
        window.addEventListener('touchend', handleTouchEnd);

        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
          window.removeEventListener('touchstart', handleTouchStart);
          window.removeEventListener('touchend', handleTouchEnd);
        };
      }, [gameState, jump, slide, throwShuriken, block, startGame]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let animationFrameId;

        const update = () => {
          const state = gameStateRef.current;
          const { ninja, obstacles, clouds } = state;

          ninja.vy += 0.6;
          ninja.y += ninja.vy;

          if (ninja.y >= GROUND_Y - ninja.height) {
            ninja.y = GROUND_Y - ninja.height;
            ninja.vy = 0;
            ninja.isJumping = false;
            ninja.jumpCount = 0;
          }

          const now = Date.now();
          if (ninja.isBlocking && now > ninja.blockEndTime) {
            ninja.isBlocking = false;
          }

          for (const cloud of clouds) {
            cloud.x -= cloud.speed;
            if (cloud.x + cloud.width < 0) {
              cloud.x = CANVAS_WIDTH;
              cloud.y = 20 + Math.random() * (GROUND_Y - 150);
            }
          }

          if (state.score >= 100 && state.purpleDeathScore === null && state.enemyNinjas.length === 0) {
            state.enemyNinjas.push({
              x: CANVAS_WIDTH + 50, y: GROUND_Y - 40, width: 30, height: 40, vy: 0, isActive: true, actionTimer: 0, jumpCount: 0, targetX: CANVAS_WIDTH - 120, moveTimer: 0, hp: 30, maxHp: 30, isDead: false, type: 'purple'
            });
          }

          if (state.purpleDeathScore !== null && state.score >= state.purpleDeathScore + 30 && state.greenDeathScore === null && state.enemyNinjas.length === 0) {
            state.enemyNinjas.push({
              x: CANVAS_WIDTH + 50, y: GROUND_Y - 40, width: 30, height: 40, vy: 0, isActive: true, actionTimer: 0, jumpCount: 0, targetX: CANVAS_WIDTH - 120, moveTimer: 0, hp: 300, maxHp: 300, isDead: false, type: 'green'
            });
          }

          if (state.greenDeathScore !== null && state.score >= state.greenDeathScore + 30 && !state.redSpawned) {
            state.redSpawned = true;
            state.enemyNinjas.push({
              x: CANVAS_WIDTH + 50, y: GROUND_Y - 40, width: 30, height: 40, vy: 0, isActive: true, actionTimer: 0, jumpCount: 0, targetX: CANVAS_WIDTH - 120, moveTimer: 0, hp: 200, maxHp: 200, isDead: false, type: 'red'
            });
            state.enemyNinjas.push({
              x: CANVAS_WIDTH + 150, y: GROUND_Y - 40, width: 30, height: 40, vy: 0, isActive: true, actionTimer: -12, jumpCount: 0, targetX: CANVAS_WIDTH - 60, moveTimer: 0, hp: 200, maxHp: 200, isDead: false, type: 'red'
            });
          }

          for (let i = state.enemyNinjas.length - 1; i >= 0; i--) {
            const enemy = state.enemyNinjas[i];
            if (!enemy.isActive) {
              state.enemyNinjas.splice(i, 1);
              continue;
            }
            
            enemy.moveTimer++;
            if (enemy.moveTimer > 80) {
              enemy.moveTimer = 0;
              enemy.targetX = CANVAS_WIDTH - 50 - Math.random() * 350; 
            }
            
            if (enemy.x < enemy.targetX - 3) enemy.x += 3.5;
            else if (enemy.x > enemy.targetX + 3) enemy.x -= 3.5;

            enemy.vy += 0.6;
            enemy.y += enemy.vy;
            if (enemy.y >= GROUND_Y - enemy.height) {
              enemy.y = GROUND_Y - enemy.height;
              enemy.vy = 0;
              enemy.jumpCount = 0;
            }

            const shouldJump = Math.random() < 0.03 || (ninja.isJumping && Math.random() < 0.05);
            if (shouldJump && enemy.jumpCount < 2) {
              enemy.vy = -12;
              enemy.jumpCount++;
            }

            enemy.actionTimer++;
            if (enemy.actionTimer > 70) {
              enemy.actionTimer = 0;
              const throwType = Math.floor(Math.random() * 4);
              const speed = state.speed * 1.4;

              if (throwType === 0) {
                const dx = ninja.x - enemy.x;
                const dy = ninja.y - enemy.y;
                const angle = Math.atan2(dy, dx);
                obstacles.push({
                  x: enemy.x, y: enemy.y + 10, width: 30, height: 30, passed: false, type: 'shuriken',
                  vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                });
              } else if (throwType === 1) {
                obstacles.push({
                  x: enemy.x, y: enemy.y + 10, width: 30, height: 30, passed: false, type: 'shuriken',
                  vx: -speed, vy: 0,
                });
              } else if (throwType === 2) {
                obstacles.push({
                  x: enemy.x, y: enemy.y + 10, width: 30, height: 30, passed: false, type: 'shuriken',
                  vx: -speed * 0.9, vy: -4,
                });
              } else {
                obstacles.push({
                  x: enemy.x, y: enemy.y + 10, width: 30, height: 30, passed: false, type: 'shuriken',
                  vx: -speed * 0.9, vy: 4,
                });
              }
            }
          }

          state.frames++;
          const spawnInterval = Math.max(50, 120 - Math.floor(state.speed * 4));
          const shouldSpawn = state.enemyNinjas.length > 0 ? (state.frames % (spawnInterval + 30) === 0) : (state.frames % spawnInterval === 0);
          
          if (shouldSpawn) {
            const rand = Math.random();
            if (rand < 0.25) {
              obstacles.push({ x: CANVAS_WIDTH, y: GROUND_Y - 60 - Math.random() * 20, width: 40, height: 30, passed: false, type: 'bird' });
            } else if (rand < 0.5) {
              obstacles.push({ x: CANVAS_WIDTH, y: GROUND_Y - 40, width: 40 + Math.random() * 20, height: 40, passed: false, type: 'monster' });
            } else if (rand < 0.75) {
              obstacles.push({ x: CANVAS_WIDTH, y: GROUND_Y - 30 - Math.random() * 50, width: 30, height: 30, passed: false, type: 'shuriken' });
            } else {
              obstacles.push({ x: CANVAS_WIDTH, y: GROUND_Y - 120, width: 80, height: 120, passed: false, type: 'building' });
            }
          }

          for (let i = 0; i < obstacles.length; i++) {
            const obs = obstacles[i];
            
            if (obs.vx !== undefined && obs.vy !== undefined) {
              obs.x += obs.vx;
              obs.y += obs.vy;
            } else {
              const obsSpeed = obs.type === 'shuriken' ? state.speed * 1.3 : state.speed;
              obs.x -= obsSpeed;
            }

            const hitboxPadding = 4;
            if (
              ninja.x + hitboxPadding < obs.x + obs.width &&
              ninja.x + ninja.width - hitboxPadding > obs.x &&
              ninja.y + hitboxPadding < obs.y + obs.height &&
              ninja.y + ninja.height - hitboxPadding > obs.y
            ) {
              if (ninja.isBlocking && obs.type === 'shuriken') {
                obs.passed = true;
                obs.y = CANVAS_HEIGHT + 100;
                state.score += 15;
                setScore(state.score);
              } else {
                state.isGameOver = true;
                setGameState('GAMEOVER');
                setHighScore((prev) => Math.max(prev, state.score));
              }
            }

            if (obs.x + obs.width < ninja.x && !obs.passed) {
              obs.passed = true;
              state.score += 10;
              setScore(state.score);
              if (state.score % 100 === 0) {
                state.speed += 0.5;
              }
            }
          }

          for (let i = obstacles.length - 1; i >= 0; i--) {
            if (obstacles[i].x + obstacles[i].width < -50 || obstacles[i].y > CANVAS_HEIGHT + 50) {
              obstacles.splice(i, 1);
            }
          }

          for (let i = state.playerShurikens.length - 1; i >= 0; i--) {
            const ps = state.playerShurikens[i];
            ps.x += ps.vx;
            
            let hit = false;
            
            for (let k = 0; k < state.enemyNinjas.length; k++) {
              const enemy = state.enemyNinjas[k];
              if (enemy.isActive) {
                const hitboxPadding = 2;
                if (
                  ps.x + hitboxPadding < enemy.x + enemy.width &&
                  ps.x + ps.width - hitboxPadding > enemy.x &&
                  ps.y + hitboxPadding < enemy.y + enemy.height &&
                  ps.y + ps.height - hitboxPadding > enemy.y
                ) {
                  enemy.hp -= 10;
                  hit = true;
                  state.score += 50;
                  setScore(state.score);
                  
                  if (enemy.hp <= 0) {
                    enemy.isActive = false;
                    enemy.isDead = true;
                    state.score += 1000;
                    setScore(state.score);
                    if (enemy.type === 'purple') {
                      state.purpleDeathScore = state.score;
                    } else if (enemy.type === 'green') {
                      state.greenDeathScore = state.score;
                    }
                  }
                  break;
                }
              }
            }

            if (!hit) {
              for (let j = obstacles.length - 1; j >= 0; j--) {
                const obs = obstacles[j];
                if (obs.type === 'monster') {
                  const hitboxPadding = 2;
                  if (
                    ps.x + hitboxPadding < obs.x + obs.width &&
                    ps.x + ps.width - hitboxPadding > obs.x &&
                    ps.y + hitboxPadding < obs.y + obs.height &&
                    ps.y + ps.height - hitboxPadding > obs.y
                  ) {
                    obstacles.splice(j, 1);
                    hit = true;
                    state.score += 20;
                    setScore(state.score);
                    break;
                  }
                }
              }
            }

            if (hit || ps.x > CANVAS_WIDTH + 50) {
              state.playerShurikens.splice(i, 1);
            }
          }
        };

        const draw = () => {
          const state = gameStateRef.current;
          const { ninja, obstacles, clouds } = state;

          const skyGradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
          skyGradient.addColorStop(0, '#170838');
          skyGradient.addColorStop(0.5, '#6b0f2a');
          skyGradient.addColorStop(1, '#9a3412');
          ctx.fillStyle = skyGradient;
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

          ctx.fillStyle = '#b91c1c';
          ctx.beginPath();
          ctx.arc(CANVAS_WIDTH / 2, GROUND_Y - 40, 80, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = 'rgba(255, 200, 200, 0.1)';
          for (const cloud of clouds) {
            ctx.beginPath();
            ctx.arc(cloud.x, cloud.y, cloud.width / 2, 0, Math.PI * 2);
            ctx.arc(cloud.x + cloud.width / 3, cloud.y - 10, cloud.width / 2.5, 0, Math.PI * 2);
            ctx.arc(cloud.x + cloud.width / 1.5, cloud.y, cloud.width / 2.5, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = '#0f0e26';
          ctx.beginPath();
          ctx.moveTo(CANVAS_WIDTH / 2 - 300, GROUND_Y);
          ctx.lineTo(CANVAS_WIDTH / 2, GROUND_Y - 200);
          ctx.lineTo(CANVAS_WIDTH / 2 + 300, GROUND_Y);
          ctx.fill();
          
          ctx.fillStyle = '#a5b4fc';
          ctx.beginPath();
          ctx.moveTo(CANVAS_WIDTH / 2 - 75, GROUND_Y - 150);
          ctx.lineTo(CANVAS_WIDTH / 2, GROUND_Y - 200);
          ctx.lineTo(CANVAS_WIDTH / 2 + 75, GROUND_Y - 150);
          ctx.lineTo(CANVAS_WIDTH / 2 + 40, GROUND_Y - 130);
          ctx.lineTo(CANVAS_WIDTH / 2, GROUND_Y - 155);
          ctx.lineTo(CANVAS_WIDTH / 2 - 40, GROUND_Y - 130);
          ctx.fill();

          ctx.fillStyle = '#020617';
          ctx.fillRect(0, GROUND_Y, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_Y);
          ctx.fillStyle = '#1e293b';
          ctx.fillRect(0, GROUND_Y, CANVAS_WIDTH, 4);

          ctx.fillStyle = '#000000';
          ctx.fillRect(ninja.x, ninja.y, ninja.width, ninja.height);
          ctx.fillStyle = '#ef4444';
          ctx.fillRect(ninja.x, ninja.y + (ninja.isSliding ? 2 : 6), ninja.width, 6);
          if (gameState === 'PLAYING') {
            ctx.beginPath();
            ctx.moveTo(ninja.x, ninja.y + (ninja.isSliding ? 5 : 9));
            ctx.lineTo(ninja.x - 15, ninja.y + (ninja.isSliding ? 1 : 5) + Math.sin(state.frames * 0.5) * 5);
            ctx.lineTo(ninja.x - 15, ninja.y + (ninja.isSliding ? 9 : 13) + Math.sin(state.frames * 0.5) * 5);
            ctx.fill();
          }
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(ninja.x + ninja.width - 12, ninja.y + (ninja.isSliding ? 10 : 14), 6, 4);

          if (ninja.isBlocking) {
            ctx.fillStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(ninja.x + ninja.width, ninja.y + 20);
            ctx.lineTo(ninja.x + ninja.width + 25, ninja.y - 5);
            ctx.lineTo(ninja.x + ninja.width + 28, ninja.y - 2);
            ctx.lineTo(ninja.x + ninja.width + 5, ninja.y + 25);
            ctx.fill();
            
            ctx.fillStyle = '#78350f';
            ctx.fillRect(ninja.x + ninja.width - 5, ninja.y + 20, 10, 8);
          }

          for (const ps of state.playerShurikens) {
            ctx.save();
            ctx.translate(ps.x + ps.width / 2, ps.y + ps.height / 2);
            ctx.rotate(state.frames * 0.4);
            ctx.fillStyle = '#cbd5e1';
            
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
              ctx.lineTo(0, -ps.width / 2);
              ctx.lineTo(ps.width / 6, -ps.width / 6);
              ctx.rotate(Math.PI / 2);
            }
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(0, 0, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          let bossIndex = 0;
          for (const enemy of state.enemyNinjas) {
            if (!enemy.isActive) continue;
            
            ctx.fillStyle = enemy.type === 'purple' ? '#4c1d95' : enemy.type === 'green' ? '#15803d' : '#b91c1c';
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            ctx.fillStyle = enemy.type === 'purple' ? '#fbbf24' : enemy.type === 'green' ? '#ef4444' : '#000000';
            ctx.fillRect(enemy.x, enemy.y + 6, enemy.width, 6);
            ctx.beginPath();
            ctx.moveTo(enemy.x + enemy.width, enemy.y + 9);
            ctx.lineTo(enemy.x + enemy.width + 15, enemy.y + 5 + Math.sin(state.frames * 0.5) * 5);
            ctx.lineTo(enemy.x + enemy.width + 15, enemy.y + 13 + Math.sin(state.frames * 0.5) * 5);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(enemy.x + 6, enemy.y + 14, 6, 4);

            const hpRatio = Math.max(0, enemy.hp / enemy.maxHp);
            const barWidth = CANVAS_WIDTH - 200;
            const barHeight = 20;
            const barX = 100;
            const barY = 20 + (bossIndex * 30);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            ctx.fillStyle = enemy.type === 'purple' ? '#a855f7' : enemy.type === 'green' ? '#22c55e' : '#ef4444';
            ctx.fillRect(barX, barY, barWidth * hpRatio, barHeight);
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const bossName = enemy.type === 'purple' ? 'PURPLE NINJA' : enemy.type === 'green' ? 'GREEN NINJA' : 'RED TWIN NINJA';
            ctx.fillText(`${bossName} - ${enemy.hp}/${enemy.maxHp}`, CANVAS_WIDTH / 2, barY + barHeight / 2);
            
            bossIndex++;
          }

          for (const obs of obstacles) {
            if (obs.type === 'shuriken') {
              ctx.save();
              ctx.translate(obs.x + obs.width / 2, obs.y + obs.height / 2);
              ctx.rotate(state.frames * 0.3);
              ctx.fillStyle = '#94a3b8';
              
              ctx.beginPath();
              for (let i = 0; i < 4; i++) {
                ctx.lineTo(0, -obs.width / 2);
                ctx.lineTo(obs.width / 6, -obs.width / 6);
                ctx.rotate(Math.PI / 2);
              }
              ctx.closePath();
              ctx.fill();
              
              ctx.fillStyle = '#0f172a';
              ctx.beginPath();
              ctx.arc(0, 0, 3, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            } else if (obs.type === 'bird') {
              ctx.fillStyle = '#38bdf8';
              ctx.beginPath();
              ctx.ellipse(obs.x + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, obs.height / 3, 0, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.moveTo(obs.x + obs.width / 2, obs.y + obs.height / 2);
              ctx.lineTo(obs.x + obs.width / 2 + 10, obs.y + obs.height / 2 - 15 + Math.sin(state.frames * 0.5) * 20);
              ctx.lineTo(obs.x + obs.width / 2 - 10, obs.y + obs.height / 2 - 15 + Math.sin(state.frames * 0.5) * 20);
              ctx.fill();
              ctx.fillStyle = '#fbbf24';
              ctx.beginPath();
              ctx.moveTo(obs.x, obs.y + obs.height / 2);
              ctx.lineTo(obs.x - 10, obs.y + obs.height / 2 + 5);
              ctx.lineTo(obs.x, obs.y + obs.height / 2 + 10);
              ctx.fill();
            } else if (obs.type === 'monster') {
              const centerX = obs.x + obs.width / 2;
              
              ctx.fillStyle = '#334155';
              ctx.beginPath();
              ctx.moveTo(centerX - 12, obs.y + 15);
              ctx.lineTo(centerX + 12, obs.y + 15);
              ctx.lineTo(centerX + 18, obs.y + obs.height);
              ctx.lineTo(centerX - 18, obs.y + obs.height);
              ctx.fill();
              
              ctx.fillStyle = '#0f172a';
              ctx.fillRect(centerX - 14, obs.y + 25, 28, 6);
              
              ctx.fillStyle = '#fcd34d';
              ctx.beginPath();
              ctx.arc(centerX, obs.y + 12, 7, 0, Math.PI * 2);
              ctx.fill();
              
              ctx.fillStyle = '#b45309';
              ctx.beginPath();
              ctx.moveTo(centerX - 20, obs.y + 10);
              ctx.lineTo(centerX, obs.y - 2);
              ctx.lineTo(centerX + 20, obs.y + 10);
              ctx.fill();
              
              ctx.fillStyle = '#78350f';
              ctx.fillRect(centerX + 15, obs.y + 10, 3, obs.height - 10);
            } else if (obs.type === 'building') {
              ctx.fillStyle = '#0f172a';
              ctx.fillRect(obs.x + 10, obs.y + 30, obs.width - 20, obs.height - 30);
              
              ctx.fillStyle = '#1e293b';
              ctx.beginPath();
              ctx.moveTo(obs.x - 10, obs.y + 30);
              ctx.lineTo(obs.x + obs.width + 10, obs.y + 30);
              ctx.lineTo(obs.x + obs.width - 15, obs.y);
              ctx.lineTo(obs.x + 15, obs.y);
              ctx.fill();
              
              ctx.fillStyle = '#fef08a';
              ctx.fillRect(obs.x + 20, obs.y + 50, 15, 25);
              ctx.fillRect(obs.x + obs.width - 35, obs.y + 50, 15, 25);
              
              ctx.fillStyle = '#0f172a';
              ctx.fillRect(obs.x + 27, obs.y + 50, 2, 25);
              ctx.fillRect(obs.x + 20, obs.y + 62, 15, 2);
              ctx.fillRect(obs.x + obs.width - 28, obs.y + 50, 2, 25);
              ctx.fillRect(obs.x + obs.width - 35, obs.y + 62, 15, 2);
            }
          }

          const nowTime = Date.now();
          
          const qCooldown = 250;
          const qElapsed = nowTime - state.lastShurikenTime;
          const qRatio = Math.max(0, 1 - qElapsed / qCooldown);
          
          ctx.fillStyle = '#1e293b';
          ctx.fillRect(20, CANVAS_HEIGHT - 60, 40, 40);
          ctx.strokeStyle = '#475569';
          ctx.lineWidth = 2;
          ctx.strokeRect(20, CANVAS_HEIGHT - 60, 40, 40);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 16px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('Q', 40, CANVAS_HEIGHT - 40);
          
          if (qRatio > 0) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(20, CANVAS_HEIGHT - 60 + (40 * (1 - qRatio)), 40, 40 * qRatio);
          }

          const wCooldown = 1000;
          const wElapsed = nowTime - state.lastBlockTime;
          const wRatio = Math.max(0, 1 - wElapsed / wCooldown);
          
          ctx.fillStyle = '#1e293b';
          ctx.fillRect(70, CANVAS_HEIGHT - 60, 40, 40);
          ctx.strokeStyle = '#475569';
          ctx.strokeRect(70, CANVAS_HEIGHT - 60, 40, 40);
          ctx.fillStyle = '#ffffff';
          ctx.fillText('W', 90, CANVAS_HEIGHT - 40);
          
          if (wRatio > 0) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(70, CANVAS_HEIGHT - 60 + (40 * (1 - wRatio)), 40, 40 * wRatio);
          }
        };

        const loop = () => {
          if (gameState === 'PLAYING') {
            update();
          }
          draw();
          if (gameState === 'PLAYING' || gameState === 'START') {
            animationFrameId = requestAnimationFrame(loop);
          }
        };

        if (gameState === 'START') {
          initGame();
          draw();
        } else if (gameState === 'PLAYING') {
          animationFrameId = requestAnimationFrame(loop);
        } else if (gameState === 'GAMEOVER') {
          draw();
        }

        return () => {
          if (animationFrameId) cancelAnimationFrame(animationFrameId);
        };
      }, [gameState, initGame]);

      return (
        <div className="min-h-screen bg-neutral-900 flex flex-col items-center justify-center p-4 font-sans select-none">
          <div className="w-full max-w-4xl relative">
            <div className="absolute top-4 right-6 text-right z-10 pointer-events-none">
              <div className="text-white text-2xl font-bold font-mono drop-shadow-md">
                {score.toString().padStart(5, '0')}
              </div>
              {highScore > 0 && (
                <div className="text-neutral-400 text-sm font-mono uppercase tracking-wider">
                  HI {highScore.toString().padStart(5, '0')}
                </div>
              )}
            </div>

            <div className="relative w-full aspect-[2/1] rounded-xl overflow-hidden shadow-2xl shadow-black/50 border-4 border-neutral-800 bg-neutral-900">
              <canvas
                ref={canvasRef}
                width={CANVAS_WIDTH}
                height={CANVAS_HEIGHT}
                className="w-full h-full block"
              />

              {gameState === 'START' && (
                <div className="absolute inset-0 bg-black/40 flex flex-col items-center justify-center backdrop-blur-sm">
                  <h1 className="text-5xl md:text-7xl font-black text-white mb-2 tracking-tighter uppercase italic drop-shadow-lg text-center">
                    Ninja Runner
                  </h1>
                  <p className="text-neutral-300 mb-8 text-lg font-medium tracking-wide text-center">
                    Press Space or Tap to Jump<br/>
                    Press Down or Tap Left to Slide<br/>
                    Press Q to Throw Shuriken<br/>
                    Press W to Block Shurikens
                  </p>
                  <button
                    onClick={startGame}
                    className="px-8 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-full text-xl transition-transform active:scale-95 shadow-lg shadow-red-600/20 uppercase tracking-wider"
                  >
                    Start Game
                  </button>
                </div>
              )}

              {gameState === 'GAMEOVER' && (
                <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center backdrop-blur-md animate-in fade-in duration-300">
                  <h2 className="text-5xl md:text-6xl font-black text-red-500 mb-2 uppercase tracking-widest drop-shadow-lg text-center">
                    Game Over
                  </h2>
                  <div className="text-white text-2xl mb-8 font-mono">
                    Score: {score}
                  </div>
                  <button
                    onClick={startGame}
                    className="px-8 py-3 bg-white hover:bg-neutral-200 text-black font-bold rounded-full text-xl transition-transform active:scale-95 shadow-xl uppercase tracking-wider"
                  >
                    Play Again
                  </button>
                </div>
              )}
            </div>
            
            <div className="mt-6 text-center text-neutral-500 text-sm">
              <p>Use <kbd className="px-2 py-1 bg-neutral-800 rounded text-neutral-300 font-mono">Space</kbd> or <kbd className="px-2 py-1 bg-neutral-800 rounded text-neutral-300 font-mono">↑</kbd> to jump (press twice for double jump).</p>
              <p className="mt-2">Use <kbd className="px-2 py-1 bg-neutral-800 rounded text-neutral-300 font-mono">↓</kbd> to slide. Mobile: Tap right side to jump, left side to slide.</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
